NitroMmfile_kotlinVersion=2.0.21
# minSdk 28 (Android 9): every pre-ARMv8 (no-AES) 32-bit CPU tops out at Android
# 8.1, so this floor guarantees the armeabi-v7a library only lands on ARMv8 CPUs
# that actually have the AES instructions. It also keeps the app off Android 8,
# which is past end-of-life for security updates.
NitroMmfile_minSdkVersion=28
NitroMmfile_targetSdkVersion=35
NitroMmfile_compileSdkVersion=34
NitroMmfile_ndkVersion=27.1.12297006
android.prefabStl=c++_shared
